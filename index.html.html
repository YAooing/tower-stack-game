<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>都市摩天楼 - 叠房子小游戏</title>
<style>
  * {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    background: #0b1224;
    touch-action: none;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  #gameCanvas {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    display: block;
  }

  /* ============ 顶部UI：关卡信息 + 当前层数 ============ */
  #topBar {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding-top: calc(env(safe-area-inset-top, 0px) + 16px);
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
    z-index: 10;
  }
  #levelLabel {
    font-size: 13px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.75);
    font-weight: 600;
    margin-bottom: 2px;
  }
  #scoreValue {
    font-size: 54px;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 4px 12px rgba(0,0,0,0.25);
    line-height: 1.1;
    transition: transform 0.15s ease;
  }
  #scoreValue.bump { transform: scale(1.25); }
  #targetLabel {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    margin-top: 2px;
  }

  .overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(10, 15, 30, 0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .card {
    width: min(84vw, 360px);
    background: linear-gradient(145deg, #ffffff, #f3f5f9);
    border-radius: 28px;
    padding: 32px 26px calc(26px + env(safe-area-inset-bottom, 0px));
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    transform: translateY(10px);
    transition: transform 0.35s ease;
  }
  .overlay.show .card { transform: translateY(0); }
  .card h1 { font-size: 23px; color: #222; margin-bottom: 6px; font-weight: 800; }
  .card p { color: #777; font-size: 13.5px; margin-bottom: 18px; line-height: 1.6; }
  .bigScore {
    font-size: 58px; font-weight: 900;
    background: linear-gradient(135deg, #ff6b6b, #4d96ff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    line-height: 1; margin: 6px 0 4px;
  }
  .bestScore { font-size: 12.5px; color: #999; margin-bottom: 20px; }
  .btn {
    display: block; width: 100%; padding: 15px 0;
    border-radius: 16px; border: none;
    font-size: 16px; font-weight: 700; color: #fff;
    background: linear-gradient(135deg, #4d96ff, #6bcb77);
    box-shadow: 0 8px 20px rgba(77,150,255,0.4);
    cursor: pointer;
    margin-bottom: 10px;
  }
  .btn:active { transform: scale(0.97); }
  .btn.secondary {
    background: #eef1f6;
    color: #555;
    box-shadow: none;
  }
  .btn.locked {
    background: #d9dde3;
    color: #9aa0aa;
    box-shadow: none;
    cursor: not-allowed;
  }
  .startIcon { font-size: 44px; margin-bottom: 8px; }

  /* 关卡选择按钮上的小字说明 */
  .levelSub {
    display: block;
    font-size: 11.5px;
    font-weight: 400;
    opacity: 0.85;
    margin-top: 2px;
  }
  #historyBest {
    font-size: 12px;
    color: #aaa;
    margin: -8px 0 16px;
  }
</style>
</head>
<body>

  <canvas id="gameCanvas"></canvas>

  <div id="topBar">
    <div id="levelLabel">第 1 关</div>
    <div id="scoreValue">0</div>
    <div id="targetLabel">目标 30 层</div>
  </div>

  <!-- 选关 / 开始界面 -->
  <div class="overlay show" id="startOverlay">
    <div class="card">
      <div class="startIcon">🏙️</div>
      <h1>都市摩天楼</h1>
      <p>点击 / 触摸屏幕，让房子落下堆叠<br>偏得越多楼越歪，歪得太狠就会倒塌！</p>
      <div id="historyBest">历史最高：0 层</div>
      <button class="btn" id="level1Btn">第一关<span class="levelSub">目标 30 层</span></button>
      <button class="btn" id="level2Btn">第二关<span class="levelSub">目标 50 层</span></button>
      <button class="btn" id="level3Btn">第三关<span class="levelSub">目标 80 层</span></button>
    </div>
  </div>

  <!-- 失败界面 -->
  <div class="overlay" id="gameOverOverlay">
    <div class="card">
      <h1 id="gameOverTitle">大楼倒塌了 🏚️</h1>
      <div class="bigScore" id="finalScore">0</div>
      <div class="bestScore" id="bestScoreLabel">最高纪录：0 层</div>
      <button class="btn" id="retryBtn">重新挑战本关</button>
      <button class="btn secondary" id="backToMenuBtn1">返回选关</button>
    </div>
  </div>

  <!-- 通关界面 -->
  <div class="overlay" id="levelClearOverlay">
    <div class="card">
      <h1 id="clearTitle">恭喜通关！🎉</h1>
      <div class="bigScore" id="clearScore">30</div>
      <div class="bestScore" id="clearSub">成功盖到目标层数</div>
      <button class="btn" id="nextLevelBtn">进入下一关</button>
      <button class="btn secondary" id="backToMenuBtn2">返回选关</button>
    </div>
  </div>

<script>
/* ==========================================================================
   都市摩天楼 —— 叠房子小游戏（物理倾斜版 + 三关卡 + 曼哈顿天际线）

   核心物理逻辑：
   1. 每一层都是一栋完整的房子，不会因为没对准就被裁掉一部分。
   2. 用"顶层房屋中心点 相对于 地基中心点"的水平偏移量作为整栋楼的"倾斜值"：
      同方向偏移会累加倾斜、反方向偏移会抵消倾斜（把楼"拉正"）。
   3. 倾斜值换算成"倒塌概率"，而不是死板阈值——轻微倾斜绝对安全，
      中等倾斜进入危险区、按概率随机判定，倾斜到重心完全移出地基则必然倒塌。
   4. 完全没有重叠（房子整个悬空，没有支撑）=> 直接倒塌，这是基本物理常识。
   ========================================================================== */

// ---------------------------------------------------------------------------
// 1. 画布初始化与尺寸适配
// ---------------------------------------------------------------------------
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let dpr = Math.max(1, window.devicePixelRatio || 1);
let W = 0, H = 0;

// 曼哈顿天际线背景使用离屏缓存，避免每帧都重新计算随机建筑，保证性能流畅
let bgCanvas = document.createElement('canvas');
let bgCtx = bgCanvas.getContext('2d');

function resizeCanvas() {
  dpr = Math.max(1, window.devicePixelRatio || 1);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  bgCanvas.width = W * dpr;
  bgCanvas.height = H * dpr;
  bgCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  renderManhattanSkyline();
}
window.addEventListener('resize', resizeCanvas);

// ---------------------------------------------------------------------------
// 2. 游戏参数
// ---------------------------------------------------------------------------
const BLOCK_HEIGHT = 48;             // 每一层楼高度（整体缩小，画面不再显得过大）
const TOP_LINE_RATIO = 0.34;         // 顶层房屋固定绘制在屏幕这个高度比例处
const PERFECT_RATIO = 0.05;         // 完美对齐容差：下方房屋宽度的5%
const SWING_MARGIN = 18;
const WIDTH_SHRINK_PER_FLOOR = 0.988; // 每盖一层略微收窄（模拟摩天楼收分造型）
const MIN_WIDTH = 38;

const LEAN_SAFE_RATIO = 0.32;
const LEAN_CERTAIN_RATIO = 1.0;
const WOBBLE_MAX_ANGLE = 0.045;

const LEVELS = [
  { level: 1, target: 30 },
  { level: 2, target: 50 },
  { level: 3, target: 80 }
];

const PALETTE = [
  '#FF8A7A', '#FFD166', '#7BD389', '#5FA8FF',
  '#C9A0FF', '#FFA36C', '#4FD1B8', '#FF8FC7'
];
const ROOF_COLORS = ['#8B4A3B', '#6B3F2E', '#A9542E', '#7A3B3B'];

let state = 'ready';      // ready -> playing -> falling -> collapsing -> gameover/clear
let score = 0;            // 等同于"当前已成功盖好的楼层数"
let bestScore = Number(localStorage.getItem('towerBestScore') || 0);
let unlockedLevel = Number(localStorage.getItem('towerUnlockedLevel') || 1);
let currentLevelIndex = 0; // 对应 LEVELS 数组下标

let blocks = [];
let swing = null;
let falling = null;
let popups = [];
let collapseAnim = null;

let currentLean = 0;
let wobblePhase = 0;

// ---------------------------------------------------------------------------
// 3. 工具函数
// ---------------------------------------------------------------------------
function pickColor(index) { return PALETTE[index % PALETTE.length]; }
function pickRoofColor(index) { return ROOF_COLORS[index % ROOF_COLORS.length]; }
function topLineY() { return H * TOP_LINE_RATIO; }
function blockScreenY(indexInArray, count) {
  return topLineY() + (count - 1 - indexInArray) * BLOCK_HEIGHT;
}
function shadeColor(hex, percent) {
  const num = parseInt(hex.slice(1), 16);
  let r = (num >> 16) + percent;
  let g = ((num >> 8) & 0x00FF) + percent;
  let b = (num & 0x0000FF) + percent;
  r = Math.min(255, Math.max(0, r));
  g = Math.min(255, Math.max(0, g));
  b = Math.min(255, Math.max(0, b));
  return '#' + (0x1000000 + r * 0x10000 + g * 0x100 + b).toString(16).slice(1);
}
function currentTarget() { return LEVELS[currentLevelIndex].target; }

// ---------------------------------------------------------------------------
// 4. 曼哈顿天际线背景（离屏缓存，只在初始化/resize时计算一次）
// ---------------------------------------------------------------------------
function renderManhattanSkyline() {
  const g = bgCtx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0d1b3d');
  g.addColorStop(0.45, '#233a68');
  g.addColorStop(0.75, '#4a5a8f');
  g.addColorStop(1, '#8a7ab0');
  bgCtx.fillStyle = g;
  bgCtx.fillRect(0, 0, W, H);

  // 一轮低垂的月亮，增加夜色氛围
  bgCtx.save();
  bgCtx.fillStyle = 'rgba(255, 250, 220, 0.9)';
  bgCtx.beginPath();
  bgCtx.arc(W * 0.78, H * 0.16, Math.min(W, H) * 0.045, 0, Math.PI * 2);
  bgCtx.fill();
  bgCtx.restore();

  // 简单的固定伪随机数生成器，保证同一次resize内布局稳定
  function seededRandom(seed) {
    let s = seed;
    return function () {
      s = (s * 9301 + 49297) % 233280;
      return s / 233280;
    };
  }

  // 远景楼群（更暗更小，制造纵深感）
  drawSkylineLayer(seededRandom(11), H * 0.62, H * 0.30, 'rgba(20, 28, 55, 0.55)', false);
  // 近景楼群（更高更深色，带天线与窗光，是画面主角）
  drawSkylineLayer(seededRandom(42), H * 0.85, H * 0.55, 'rgba(10, 14, 30, 0.92)', true);
}

// 绘制一层天际线剪影
// baseY: 建筑群底部线；maxH: 建筑最大高度；withDetail: 是否画天线/窗光（近景才画）
function drawSkylineLayer(rand, baseY, maxH, color, withDetail) {
  let bx = 0;
  bgCtx.fillStyle = color;
  while (bx < W) {
    const bw = 34 + rand() * 46;
    let bh = maxH * (0.35 + rand() * 0.65);
    const topY = baseY - bh;

    // 楼顶形状随机：平顶 / 退台顶（Art Deco风格）/ 尖顶天线
    const roofType = Math.floor(rand() * 3);
    bgCtx.beginPath();
    if (roofType === 0) {
      // 平顶
      bgCtx.rect(bx, topY, bw, bh + 260);
      bgCtx.fill();
    } else if (roofType === 1) {
      // 退台顶：像帝国大厦那种一层层收窄向上
      const stepCount = 3;
      let curW = bw, curX = bx, curY = topY;
      bgCtx.rect(curX, curY, curW, bh + 260 - (baseY - curY));
      bgCtx.fill();
      for (let s = 0; s < stepCount; s++) {
        const stepH = bh * 0.12;
        curW *= 0.62;
        curX = bx + (bw - curW) / 2;
        curY -= stepH;
        bgCtx.beginPath();
        bgCtx.rect(curX, curY, curW, stepH + 2);
        bgCtx.fill();
      }
      bh += stepCount * bh * 0.12;
    } else {
      // 尖顶天线（像克莱斯勒大厦那种）
      bgCtx.rect(bx, topY, bw, bh + 260);
      bgCtx.fill();
      bgCtx.beginPath();
      bgCtx.moveTo(bx + bw * 0.5 - 2, topY);
      bgCtx.lineTo(bx + bw * 0.5 + 2, topY);
      bgCtx.lineTo(bx + bw * 0.5 + 1, topY - bh * 0.22);
      bgCtx.lineTo(bx + bw * 0.5 - 1, topY - bh * 0.22);
      bgCtx.closePath();
      bgCtx.fill();
    }

    // 近景楼群加窗光点缀，营造纽约夜景的万家灯火感
    if (withDetail) {
      const winCols = Math.max(2, Math.floor(bw / 12));
      const winRows = Math.max(3, Math.floor(bh / 16));
      bgCtx.fillStyle = 'rgba(255, 214, 120, 0.55)';
      for (let r = 0; r < winRows; r++) {
        for (let c = 0; c < winCols; c++) {
          if (rand() > 0.62) continue; // 随机熄灯的窗户，避免太规整
          const wx = bx + 6 + c * (bw - 12) / winCols;
          const wy = topY + 10 + r * (bh - 16) / winRows;
          bgCtx.fillRect(wx, wy, 3, 5);
        }
      }
      bgCtx.fillStyle = color;
    }

    bx += bw + 3 + rand() * 5;
  }
}

// ---------------------------------------------------------------------------
// 5. 初始化 / 关卡开始
// ---------------------------------------------------------------------------
function startLevel(levelIndex) {
  currentLevelIndex = levelIndex;
  score = 0;
  currentLean = 0;
  updateScoreUI(false);
  updateLevelUI();

  const baseWidth = Math.min(W * 0.22, 100);
  blocks = [{
    x: (W - baseWidth) / 2,
    width: baseWidth,
    color: pickColor(0)
  }];

  popups = [];
  falling = null;
  collapseAnim = null;

  spawnSwingBlock();
  state = 'playing';

  startOverlay.classList.remove('show');
  gameOverOverlay.classList.remove('show');
  levelClearOverlay.classList.remove('show');
}

function spawnSwingBlock() {
  const last = blocks[blocks.length - 1];
  const width = Math.max(MIN_WIDTH, last.width * WIDTH_SHRINK_PER_FLOOR);

  const speed = Math.min(2.2 + score * 0.04, 6.5);
  const startFromLeft = blocks.length % 2 === 0;
  const minX = SWING_MARGIN;
  const maxX = W - SWING_MARGIN - width;

  swing = {
    x: startFromLeft ? minX : maxX,
    width: width,
    dir: startFromLeft ? 1 : -1,
    speed: speed,
    color: pickColor(blocks.length),
    roofColor: pickRoofColor(blocks.length),
    floorNumber: blocks.length // blocks.length(含地基) 恰好等于"如果这栋成功落地，它将是第几层"
  };
}

// ---------------------------------------------------------------------------
// 6. 核心交互：点击/触摸 => 房屋落下，判定"稳/歪/塌"
// ---------------------------------------------------------------------------
function handleDrop() {
  if (state !== 'playing' || !swing) return;

  const last = blocks[blocks.length - 1];
  const baseCenterX = blocks[0].x + blocks[0].width / 2;

  const sx = swing.x;
  const sw = swing.width;

  const overlapLeft = Math.max(sx, last.x);
  const overlapRight = Math.min(sx + sw, last.x + last.width);
  const overlapWidth = overlapRight - overlapLeft;

  if (overlapWidth <= 0) {
    // 完全没有支撑点：现实中根本没地方落脚，必然直接坠落
    triggerCollapse(sx < last.x ? -1 : 1, true);
    return;
  }

  // 房屋始终保持完整宽度，不裁剪
  const finalX = sx;
  const finalWidth = sw;

  const diff = Math.abs(sx - last.x);
  const isPerfect = diff <= last.width * PERFECT_RATIO;

  const newCenterX = finalX + finalWidth / 2;
  const newLean = isPerfect ? currentLean : (newCenterX - baseCenterX);
  currentLean = newLean;

  const baseWidth = blocks[0].width;
  const leanRatio = Math.abs(currentLean) / (baseWidth / 2);

  let collapseProbability = 0;
  if (leanRatio >= LEAN_CERTAIN_RATIO) {
    collapseProbability = 1;
  } else if (leanRatio > LEAN_SAFE_RATIO) {
    const t = (leanRatio - LEAN_SAFE_RATIO) / (LEAN_CERTAIN_RATIO - LEAN_SAFE_RATIO);
    const heightRisk = 1 + Math.min(0.6, blocks.length * 0.01);
    collapseProbability = Math.min(1, t * t * heightRisk);
  }
  const willCollapse = Math.random() < collapseProbability;

  falling = {
    x: finalX,
    width: finalWidth,
    color: swing.color,
    roofColor: swing.roofColor,
    floorNumber: swing.floorNumber,
    fromY: topLineY() - BLOCK_HEIGHT,
    toY: topLineY(),
    startTime: performance.now(),
    duration: 130,
    isPerfect: isPerfect,
    willCollapse: willCollapse,
    collapseDir: currentLean >= 0 ? 1 : -1
  };
  swing = null;
  state = 'falling';

  if (isPerfect) {
    popups.push({ text: '完美！稳如泰山', x: finalX + finalWidth / 2, y: topLineY() - 10, life: 1, color: '#FFD166' });
  } else if (!willCollapse && leanRatio > LEAN_SAFE_RATIO) {
    popups.push({ text: '晃了一下…', x: finalX + finalWidth / 2, y: topLineY() - 10, life: 1, color: '#FFA36C' });
  }
}

function triggerCollapse(dir, noSupport) {
  collapseAnim = { dir: dir, startTime: performance.now(), duration: 900, noSupport: noSupport };
  swing = null;
  state = 'collapsing';
}

// ---------------------------------------------------------------------------
// 7. 每帧更新
// ---------------------------------------------------------------------------
function update() {
  wobblePhase += 0.05;

  if (state === 'playing' && swing) {
    swing.x += swing.dir * swing.speed;
    const minX = SWING_MARGIN;
    const maxX = W - SWING_MARGIN - swing.width;
    if (swing.x <= minX) { swing.x = minX; swing.dir = 1; }
    if (swing.x >= maxX) { swing.x = maxX; swing.dir = -1; }
  }

  if (state === 'falling' && falling) {
    const t = Math.min(1, (performance.now() - falling.startTime) / falling.duration);
    const eased = t * t;
    falling.currentY = falling.fromY + (falling.toY - falling.fromY) * eased;

    if (t >= 1) {
      const dir = falling.collapseDir;
      const willCollapse = falling.willCollapse;
      blocks.push({ x: falling.x, width: falling.width, color: falling.color, roofColor: falling.roofColor });
      falling = null;

      if (willCollapse) {
        triggerCollapse(dir, false);
      } else {
        score = blocks.length - 1; // 层数 = 已放置房屋数（不含地基）
        updateScoreUI(true);

        if (score >= currentTarget()) {
          onLevelClear();
        } else {
          spawnSwingBlock();
          state = 'playing';
        }
      }
    }
  }

  if (state === 'collapsing' && collapseAnim) {
    const t = Math.min(1, (performance.now() - collapseAnim.startTime) / collapseAnim.duration);
    if (t >= 1) endGame();
  }

  popups.forEach(p => { p.y -= 0.6; p.life -= 0.02; });
  popups = popups.filter(p => p.life > 0);
}

function currentWobbleAngle() {
  if (blocks.length === 0) return 0;
  const baseWidth = blocks[0].width;
  const leanRatio = Math.min(1.2, Math.abs(currentLean) / (baseWidth / 2));
  const amplitude = WOBBLE_MAX_ANGLE * leanRatio;
  const freq = 1.2 + leanRatio * 2.2;
  const sign = currentLean >= 0 ? 1 : -1;
  return sign * amplitude * 0.6 + Math.sin(wobblePhase * freq) * amplitude;
}

// ---------------------------------------------------------------------------
// 8. 绘制：一栋房子
// isTop: 是否为数组中真正的最后一栋（只有它露出屋顶+门，其余楼层屋顶被压在下面盖住了）
// ---------------------------------------------------------------------------
function drawHouse(x, y, w, h, color, roofColor, isTop) {
  ctx.save();

  let bodyY = y, bodyH = h;
  if (isTop) {
    const roofH = h * 0.38;
    bodyY = y + roofH;
    bodyH = h - roofH;
    const apexX = x + w / 2, apexY = y;
    const eaveL = x - 6, eaveR = x + w + 6;

    // 屋顶两个坡面分开画，制造左亮右暗的立体光影
    ctx.beginPath();
    ctx.moveTo(eaveL, bodyY);
    ctx.lineTo(apexX, apexY);
    ctx.lineTo(apexX, bodyY);
    ctx.closePath();
    ctx.fillStyle = shadeColor(roofColor, 14);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(apexX, apexY);
    ctx.lineTo(eaveR, bodyY);
    ctx.lineTo(apexX, bodyY);
    ctx.closePath();
    ctx.fillStyle = shadeColor(roofColor, -12);
    ctx.fill();

    // 屋脊高光线
    ctx.strokeStyle = shadeColor(roofColor, 30);
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(apexX, apexY);
    ctx.lineTo(apexX, bodyY);
    ctx.stroke();

    // 屋檐边缘线
    ctx.strokeStyle = shadeColor(roofColor, -25);
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(eaveL, bodyY);
    ctx.lineTo(apexX, apexY);
    ctx.lineTo(eaveR, bodyY);
    ctx.stroke();

    // 小烟囱
    ctx.fillStyle = shadeColor(roofColor, -30);
    const chimW = Math.max(7, w * 0.09);
    const chimX = x + w * 0.66;
    ctx.fillRect(chimX, y - h * 0.02, chimW, h * 0.2);
    ctx.fillStyle = shadeColor(roofColor, -10);
    ctx.fillRect(chimX - 2, y - h * 0.02, chimW + 4, 5);
  }

  // 房屋主体墙面
  const grad = ctx.createLinearGradient(x, bodyY, x, bodyY + bodyH);
  grad.addColorStop(0, shadeColor(color, 18));
  grad.addColorStop(1, shadeColor(color, -6));
  ctx.fillStyle = grad;
  const r = 3;
  ctx.beginPath();
  ctx.moveTo(x + r, bodyY);
  ctx.arcTo(x + w, bodyY, x + w, bodyY + bodyH, r);
  ctx.arcTo(x + w, bodyY + bodyH, x, bodyY + bodyH, r);
  ctx.arcTo(x, bodyY + bodyH, x, bodyY, r);
  ctx.arcTo(x, bodyY, x + w, bodyY, r);
  ctx.closePath();
  ctx.fill();

  // 墙面竖向壁板纹理，避免大色块显得单调廉价
  ctx.strokeStyle = 'rgba(0,0,0,0.06)';
  ctx.lineWidth = 1;
  const stripeGap = Math.max(10, w / 8);
  for (let sx2 = x + stripeGap; sx2 < x + w; sx2 += stripeGap) {
    ctx.beginPath();
    ctx.moveTo(sx2, bodyY + 2);
    ctx.lineTo(sx2, bodyY + bodyH - 2);
    ctx.stroke();
  }

  // 窗户：自动按宽度排布列数，每扇窗带十字窗棂，更精致可爱
  const cols = w > 58 ? 2 : 1;
  const rows = isTop ? 1 : 2;
  const winW = Math.min(w / (cols * 2.4), bodyH * 0.32);
  const winH = bodyH / (rows + 1.6);
  const rowGap = bodyH / (rows + 1);

  for (let row = 0; row < rows; row++) {
    const wy = bodyY + rowGap * (row + 1) - winH / 2;
    for (let c = 0; c < cols; c++) {
      const wx = x + (w / (cols + 1)) * (c + 1) - winW / 2;
      // 窗框
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fillRect(wx - 1.5, wy - 1.5, winW + 3, winH + 3);
      // 窗玻璃（暖黄色代表亮灯）
      ctx.fillStyle = 'rgba(255, 224, 145, 0.95)';
      ctx.fillRect(wx, wy, winW, winH);
      // 十字窗棂
      ctx.strokeStyle = 'rgba(255,255,255,0.9)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(wx + winW / 2, wy);
      ctx.lineTo(wx + winW / 2, wy + winH);
      ctx.moveTo(wx, wy + winH / 2);
      ctx.lineTo(wx + winW, wy + winH / 2);
      ctx.stroke();
    }
  }

  // 门：只有顶层房子才画，代表它是"入口"
  if (isTop) {
    const doorW = w * 0.2;
    const doorH = bodyH * 0.46;
    const doorX = x + w / 2 - doorW / 2;
    const doorY = bodyY + bodyH - doorH;
    ctx.fillStyle = shadeColor(color, -35);
    ctx.beginPath();
    ctx.moveTo(doorX, doorY + doorH);
    ctx.lineTo(doorX, doorY + doorH * 0.18);
    ctx.arcTo(doorX, doorY, doorX + doorW / 2, doorY, doorW / 2 * 0.5);
    ctx.arcTo(doorX + doorW, doorY, doorX + doorW, doorY + doorH * 0.18, doorW / 2 * 0.5);
    ctx.lineTo(doorX + doorW, doorY + doorH);
    ctx.closePath();
    ctx.fill();
    // 门把手
    ctx.fillStyle = 'rgba(255, 224, 145, 0.95)';
    ctx.beginPath();
    ctx.arc(doorX + doorW * 0.78, doorY + doorH * 0.55, Math.max(1.5, w * 0.012), 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

// ---------------------------------------------------------------------------
// 9. 绘制主函数
// ---------------------------------------------------------------------------
function draw() {
  ctx.drawImage(bgCanvas, 0, 0, W, H);

  const count = blocks.length;
  const angle = (state === 'playing' || state === 'falling') ? currentWobbleAngle() : 0;

  const pivotX = blocks.length ? blocks[0].x + blocks[0].width / 2 : W / 2;
  const pivotY = blocks.length ? blockScreenY(0, count) + BLOCK_HEIGHT : H;

  ctx.save();
  if (state === 'collapsing' && collapseAnim) {
    const t = Math.min(1, (performance.now() - collapseAnim.startTime) / collapseAnim.duration);
    const eased = 1 - Math.pow(1 - t, 2);
    const collapseAngle = collapseAnim.dir * eased * (Math.PI / 2.3);
    ctx.globalAlpha = Math.max(0, 1 - t * 0.9);
    ctx.translate(pivotX, pivotY);
    ctx.rotate(collapseAngle);
    ctx.translate(-pivotX, -pivotY);
  } else {
    ctx.translate(pivotX, pivotY);
    ctx.rotate(angle);
    ctx.translate(-pivotX, -pivotY);
  }

  blocks.forEach((b, i) => {
    const y = blockScreenY(i, count);
    if (y > -BLOCK_HEIGHT && y < H + BLOCK_HEIGHT) {
      const isTop = (i === currentTarget()); // 只有本关目标层（例如第30/50/80层）才封顶画屋顶
      drawHouse(b.x, y, b.width, BLOCK_HEIGHT, b.color, b.roofColor || '#8B4A3B', isTop);
    }
  });

  if (state === 'playing' && swing) {
    const y = topLineY() - BLOCK_HEIGHT;
    const isFinalFloor = swing.floorNumber === currentTarget();
    drawHouse(swing.x, y, swing.width, BLOCK_HEIGHT, swing.color, swing.roofColor, isFinalFloor);
  }

  if (state === 'falling' && falling) {
    const isFinalFloor = falling.floorNumber === currentTarget();
    drawHouse(falling.x, falling.currentY, falling.width, BLOCK_HEIGHT, falling.color, falling.roofColor, isFinalFloor);
  }

  ctx.restore();

  popups.forEach(p => {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.font = 'bold 24px sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.3)';
    ctx.shadowBlur = 6;
    ctx.fillText(p.text, p.x, p.y);
    ctx.restore();
  });
}

// ---------------------------------------------------------------------------
// 10. 主循环
// ---------------------------------------------------------------------------
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ---------------------------------------------------------------------------
// 11. UI 更新
// ---------------------------------------------------------------------------
const scoreValueEl = document.getElementById('scoreValue');
const levelLabelEl = document.getElementById('levelLabel');
const targetLabelEl = document.getElementById('targetLabel');

function updateScoreUI(bump) {
  scoreValueEl.textContent = score;
  if (bump) {
    scoreValueEl.classList.remove('bump');
    void scoreValueEl.offsetWidth;
    scoreValueEl.classList.add('bump');
  }
}
function updateLevelUI() {
  levelLabelEl.textContent = '第 ' + LEVELS[currentLevelIndex].level + ' 关';
  targetLabelEl.textContent = '目标 ' + currentTarget() + ' 层';
}

const gameOverOverlay = document.getElementById('gameOverOverlay');
const gameOverTitleEl = document.getElementById('gameOverTitle');
const finalScoreEl = document.getElementById('finalScore');
const bestScoreLabelEl = document.getElementById('bestScoreLabel');

const levelClearOverlay = document.getElementById('levelClearOverlay');
const clearTitleEl = document.getElementById('clearTitle');
const clearScoreEl = document.getElementById('clearScore');
const clearSubEl = document.getElementById('clearSub');
const nextLevelBtn = document.getElementById('nextLevelBtn');

function saveBestScore() {
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('towerBestScore', String(bestScore));
  }
}

function endGame() {
  state = 'gameover';
  saveBestScore();
  gameOverTitleEl.textContent = collapseAnim && collapseAnim.noSupport
    ? '房子没地方落脚，掉了 🏚️'
    : '大楼太歪，倒塌了 🏚️';
  finalScoreEl.textContent = score;
  bestScoreLabelEl.textContent = `最高纪录：${bestScore} 层`;
  gameOverOverlay.classList.add('show');
}

function onLevelClear() {
  state = 'gameover'; // 复用非playing状态，暂停摆动/下落逻辑
  saveBestScore();

  const levelNum = LEVELS[currentLevelIndex].level;
  // 通关后解锁下一关（不超过关卡总数），并取历史已解锁进度和当前进度中较大的一个
  unlockedLevel = Math.max(unlockedLevel, Math.min(LEVELS.length, levelNum + 1));
  localStorage.setItem('towerUnlockedLevel', String(unlockedLevel));

  const isLastLevel = currentLevelIndex === LEVELS.length - 1;
  clearTitleEl.textContent = isLastLevel ? '全部通关！建筑大师 🏆' : `第 ${levelNum} 关通关！🎉`;
  clearScoreEl.textContent = score;
  clearSubEl.textContent = isLastLevel ? '你已经盖完了所有关卡' : '成功盖到目标层数';
  nextLevelBtn.style.display = isLastLevel ? 'none' : 'block';
  nextLevelBtn.textContent = '进入下一关';

  refreshLevelButtons();
  levelClearOverlay.classList.add('show');
}

// ---------------------------------------------------------------------------
// 12. 输入处理：触摸 + 鼠标
// ---------------------------------------------------------------------------
function onUserTap(e) {
  if (e.target.closest('.card')) return;
  if (state === 'playing') handleDrop();
}
canvas.addEventListener('touchstart', function (e) {
  e.preventDefault();
  onUserTap(e);
}, { passive: false });
canvas.addEventListener('mousedown', onUserTap);

// ---------------------------------------------------------------------------
// 13. 选关 / 开始 / 重试 / 下一关 按钮逻辑
// ---------------------------------------------------------------------------
const startOverlay = document.getElementById('startOverlay');
const level1Btn = document.getElementById('level1Btn');
const level2Btn = document.getElementById('level2Btn');
const level3Btn = document.getElementById('level3Btn');
const historyBestEl = document.getElementById('historyBest');
const levelBtns = [level1Btn, level2Btn, level3Btn];

function refreshLevelButtons() {
  levelBtns.forEach((btn, idx) => {
    const levelNum = idx + 1;
    btn.classList.remove('locked');
    if (levelNum > unlockedLevel) {
      btn.classList.add('locked');
      btn.querySelector('.levelSub').textContent = '🔒 先通过上一关解锁';
    } else {
      btn.querySelector('.levelSub').textContent = '目标 ' + LEVELS[idx].target + ' 层';
    }
  });
  historyBestEl.textContent = '历史最高：' + bestScore + ' 层';
}

levelBtns.forEach((btn, idx) => {
  btn.addEventListener('click', () => {
    if (idx + 1 > unlockedLevel) return; // 未解锁，不可点击
    startLevel(idx);
  });
});

document.getElementById('retryBtn').addEventListener('click', () => {
  gameOverOverlay.classList.remove('show');
  startLevel(currentLevelIndex);
});
document.getElementById('backToMenuBtn1').addEventListener('click', () => {
  gameOverOverlay.classList.remove('show');
  refreshLevelButtons();
  startOverlay.classList.add('show');
  state = 'ready';
});
document.getElementById('backToMenuBtn2').addEventListener('click', () => {
  levelClearOverlay.classList.remove('show');
  refreshLevelButtons();
  startOverlay.classList.add('show');
  state = 'ready';
});
nextLevelBtn.addEventListener('click', () => {
  levelClearOverlay.classList.remove('show');
  const next = Math.min(LEVELS.length - 1, currentLevelIndex + 1);
  startLevel(next);
});

// ---------------------------------------------------------------------------
// 14. 启动
// ---------------------------------------------------------------------------
resizeCanvas();
refreshLevelButtons();
</script>
</body>
</html>
